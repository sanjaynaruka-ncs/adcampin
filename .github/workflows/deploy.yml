name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          echo "🚀 Triggering Vercel Deploy..."
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.vercel.com/v1/integrations/deploy/prj_0C14Td1DBq4hmXPPwyzokSAtNHGX/Erk3B1L65r")
          echo "HTTP Status: $response"

          if [ "$response" -ne 200 ]; then
            echo "❌ Deploy failed"
            exit 1
          fi

          echo "✅ Deploy triggered successfully"